apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
  namespace: vikunja
spec:
  interval: 1h
  chart:
    spec:
      chart: vikunja
      sourceRef:
        kind: HelmRepository
        name: vikunja
        namespace: flux-system

  values:

    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: tasks.yourdomain.com
          paths:
            - path: /
              pathType: Prefix

    persistence:
      enabled: true
      size: 10Gi

    env:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres.vikunja.svc.cluster.local
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: vikunja
